AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: User Authentication Lambda

Globals:
  Function:
    Runtime: provided.al2023
    Architectures:
      - x86_64
    Timeout: 30
    Environment:
      Variables:
        JWT_SECRET: 5b9b178c235820c6e69fbf54876bc4df3ffb4f3ab5ec87305b8b42d2481358c3
        JWT_REFRESH_SECRET: local-dev-refresh-secret
        DB_HOST: localstack-postgres
        DB_USER: postgres
        DB_PASSWORD: postgres
        DB_NAME: authdb
        DB_PORT: "5432"
        DYNAMODB_TABLE_NAME: user-auth-tokens
        AWS_ENDPOINT_URL: http://localstack:4566
        AWS_ACCESS_KEY_ID: test
        AWS_SECRET_ACCESS_KEY: test
        AWS_REGION: us-east-1

Resources:
  UserAuthFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: user-auth-function
      CodeUri: cmd/
      Handler: bootstrap
      Events:
        Login:
          Type: Api
          Properties:
            Path: /sessions
            Method: post
        RefreshSession:
          Type: Api
          Properties:
            Path: /sessions/refresh
            Method: post
        Logout:
          Type: Api
          Properties:
            Path: /sessions/logout
            Method: delete
        CatchAll:
          Type: Api
          Properties:
            Path: /{proxy+}
            Method: any
    Metadata:
      BuildMethod: go1.x
